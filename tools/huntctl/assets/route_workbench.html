<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dusklight Route Tree</title>
  <style>
    :root { color-scheme: dark; --bg:#0b0e13; --panel:#121720; --panel2:#171e29; --line:#293241; --text:#e8edf5; --muted:#8c98aa; --cyan:#6dd8cb; --blue:#86aefb; --amber:#e7bd68; --red:#f1788c; font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
    * { box-sizing:border-box; }
    body { margin:0; height:100vh; overflow:hidden; background:var(--bg); color:var(--text); }
    button,textarea { font:inherit; }
    header { height:48px; display:flex; align-items:center; gap:10px; padding:0 14px; border-bottom:1px solid var(--line); background:#0d1117; }
    .mark { width:24px; height:24px; display:grid; place-items:center; border-radius:5px; background:var(--cyan); color:#07100f; font-size:12px; font-weight:900; }
    .title strong { display:block; font-size:13px; }
    .title span { display:block; color:var(--muted); font-size:10px; }
    .spacer { flex:1; }
    .status { color:var(--muted); font-size:11px; }
    .status.ok { color:var(--cyan); }
    .status.error,.error-note { color:var(--red); }
    .reload { padding:5px 9px; border:1px solid var(--line); border-radius:5px; background:var(--panel); color:var(--text); cursor:pointer; font-size:11px; }
    main { height:calc(100vh - 48px); display:grid; grid-template-columns:minmax(300px,420px) minmax(420px,1fr); }
    .browser { min-width:0; overflow:auto; border-right:1px solid var(--line); }
    .pane-title { position:sticky; top:0; z-index:2; height:34px; display:flex; align-items:center; padding:0 12px; border-bottom:1px solid var(--line); background:#0f141c; color:var(--muted); font-size:10px; font-weight:750; letter-spacing:.08em; text-transform:uppercase; }
    .tree { padding:6px; font-size:12px; }
    .tree-children { margin-left:13px; padding-left:8px; border-left:1px solid #242d3a; }
    .tree-row { min-height:27px; display:flex; align-items:center; gap:5px; padding:2px 6px 2px 2px; border-radius:4px; color:#cfd6e2; cursor:default; user-select:none; }
    .tree-row:hover { background:#151c26; }
    .tree-row.selected { background:#20314a; color:#fff; }
    .disclosure { width:18px; height:22px; padding:0; border:0; background:transparent; color:#738096; cursor:pointer; line-height:1; }
    .disclosure.open { transform:rotate(90deg); }
    .disclosure.empty { visibility:hidden; }
    .tree-icon { width:16px; color:var(--muted); text-align:center; font-size:10px; }
    .tree-icon.origin { color:var(--cyan); }
    .tree-icon.segment { color:var(--blue); }
    .tree-icon.variant { color:var(--amber); }
    .tree-icon.draft { color:#bd8cf1; }
    .tree-name { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tree-tail { margin-left:auto; display:flex; gap:5px; align-items:center; color:var(--muted); font-size:9px; }
    .dot { width:6px; height:6px; border-radius:50%; background:#5e6a7c; }
    .dot.ok { background:var(--cyan); }
    .dot.warn { background:var(--amber); }
    .dot.bad { background:var(--red); }
    .details { min-width:0; overflow:auto; background:var(--panel); }
    .detail-body { width:min(720px,100%); padding:22px 26px 60px; }
    .detail-kicker { color:var(--muted); font-size:10px; font-weight:750; letter-spacing:.08em; text-transform:uppercase; }
    .detail-title { margin:5px 0 4px; font-size:20px; font-weight:700; }
    .detail-subtitle { color:var(--muted); font-size:12px; line-height:1.5; }
    .badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
    .badge { padding:3px 7px; border-radius:999px; background:#222c3a; color:var(--muted); font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .badge.incumbent,.badge.blue { color:var(--blue); }
    .badge.score { color:var(--amber); }
    .badge.ok,.badge.proof-verified { color:var(--cyan); }
    .badge.bad,.badge.proof-missing,.badge.proof-stale { color:var(--red); }
    .detail-section { margin-top:24px; }
    .detail-section h3 { margin:0 0 9px; color:#b5c0d0; font-size:10px; letter-spacing:.08em; text-transform:uppercase; }
    .fields { display:grid; grid-template-columns:150px minmax(0,1fr); border-top:1px solid var(--line); }
    .field-label,.field-value { min-height:34px; padding:8px 0; border-bottom:1px solid var(--line); font-size:11px; }
    .field-label { color:var(--muted); }
    .field-value { min-width:0; color:#dce3ee; overflow-wrap:anywhere; }
    code,.mono { font-family:ui-monospace,SFMono-Regular,Consolas,monospace; }
    .predicate { padding:11px 12px; border:1px solid var(--line); border-radius:6px; background:#0d1219; color:#bfc9d8; font:11px/1.5 ui-monospace,SFMono-Regular,Consolas,monospace; white-space:pre-wrap; overflow-wrap:anywhere; }
    .advanced { margin-top:10px; color:var(--muted); font-size:11px; }
    .advanced summary { cursor:pointer; }
    .advanced .predicate { margin-top:8px; }
    .actions { display:flex; flex-wrap:wrap; gap:7px; margin-top:20px; }
    .play,.record,.rename,.delete,.edit-predicate { padding:7px 10px; border-radius:5px; font-size:11px; font-weight:700; cursor:pointer; }
    .play { border:1px solid rgba(109,216,203,.5); background:rgba(109,216,203,.08); color:var(--cyan); }
    .record { border:1px solid rgba(231,189,104,.5); background:rgba(231,189,104,.08); color:var(--amber); }
    .rename,.edit-predicate { border:1px solid rgba(134,174,251,.5); background:rgba(134,174,251,.08); color:var(--blue); }
    .delete { border:1px solid rgba(241,120,140,.5); background:rgba(241,120,140,.07); color:var(--red); }
    .play:disabled,.record:disabled,.rename:disabled,.delete:disabled { border-color:var(--line); color:#667286; background:#151a22; cursor:not-allowed; }
    .empty { padding:20px; color:var(--muted); font-size:11px; }
    .toast { position:fixed; right:16px; bottom:16px; max-width:440px; padding:11px 13px; border:1px solid var(--line); border-radius:7px; background:#171e29; box-shadow:0 18px 50px rgba(0,0,0,.5); font-size:12px; opacity:0; transform:translateY(6px); pointer-events:none; transition:.15s ease; }
    .toast.show { opacity:1; transform:none; }
    .toast.error { border-color:rgba(241,120,140,.5); color:#ffc1cb; }
    dialog { width:min(860px,calc(100% - 28px)); padding:0; border:1px solid var(--line); border-radius:9px; background:var(--panel); color:var(--text); }
    dialog::backdrop { background:rgba(3,5,8,.8); }
    .editor { display:grid; gap:12px; padding:18px; }
    .editor h2 { margin:0; font-size:17px; }
    .editor p { margin:0; color:var(--muted); font-size:11px; line-height:1.5; }
    .editor textarea { width:100%; min-height:min(62vh,620px); resize:vertical; padding:12px; border:1px solid var(--line); border-radius:6px; background:#090d13; color:var(--text); font:12px/1.55 ui-monospace,SFMono-Regular,Consolas,monospace; }
    .editor-error { min-height:18px; color:var(--red); font-size:11px; white-space:pre-wrap; }
    .editor-actions { display:flex; justify-content:flex-end; gap:7px; }
    .editor-actions button { padding:7px 11px; border:1px solid var(--line); border-radius:5px; background:#151c27; color:var(--text); cursor:pointer; }
    .editor-actions .save { border-color:rgba(109,216,203,.55); color:var(--cyan); }
    @media (max-width:760px) { body{overflow:auto} main{height:auto;min-height:calc(100vh - 48px);grid-template-columns:1fr}.browser{height:45vh;border-right:0;border-bottom:1px solid var(--line)}.details{min-height:55vh}.status{display:none}.detail-body{padding:18px}.fields{grid-template-columns:110px 1fr} }
  </style>
</head>
<body>
  <header>
    <div class="mark">D</div>
    <div class="title"><strong>Route Workbench</strong><span id="timelineName">Loading Git timeline…</span></div>
    <div class="spacer"></div>
    <span id="status" class="status">Connecting…</span>
    <button id="reload" class="reload" type="button">Reload</button>
  </header>
  <main>
    <section class="browser" aria-label="Route tree">
      <div class="pane-title">Route</div>
      <div id="tree" class="tree" role="tree"><div class="empty">Loading route…</div></div>
    </section>
    <aside class="details" aria-label="Selection details">
      <div class="pane-title">Details</div>
      <div id="detail" class="detail-body"><div class="empty">Select a route entry.</div></div>
    </aside>
  </main>
  <dialog id="predicateEditor">
    <form id="predicateForm" class="editor" method="dialog">
      <h2 id="predicateTitle">Edit goal predicates</h2>
      <p>Segment goals are compiled as one predicate program. Definition names and order must continue to match the timeline.</p>
      <textarea id="predicateSource" spellcheck="false" aria-label="Goal predicate DSL source"></textarea>
      <div id="predicateError" class="editor-error" role="alert"></div>
      <div class="editor-actions"><button value="cancel" type="submit">Cancel</button><button id="savePredicate" class="save" value="default" type="button">Validate &amp; save</button></div>
    </form>
  </dialog>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script>
  (() => {
    'use strict';
    const $ = id => document.getElementById(id);
    let graph = null;
    let predicateEditRevision = null;
    let selection = {kind:'origin',id:'boot',occurrence:'origin:boot',chain:[]};
    let expanded = new Set(['origin:boot']);
    let expansionInitialized = false;
    let occurrenceIndex = new Map();
    const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const label = value => String(value ?? '').replaceAll('_', ' ');
    const short = value => { const text=String(value ?? ''); return text.length > 20 ? `${text.slice(0,8)}…${text.slice(-7)}` : text; };
    function toast(message, error=false) {
      const element=$('toast'); element.textContent=message; element.className=`toast show${error?' error':''}`;
      clearTimeout(toast.timer); toast.timer=setTimeout(()=>element.className='toast', 5000);
    }
    function normalize(raw) {
      const segments=Array.isArray(raw.segments)?raw.segments:Object.entries(raw.segments||{}).map(([id,item])=>({...item,id:item.id||id}));
      const goals=Array.isArray(raw.goals)?raw.goals:Object.entries(raw.goals||{}).map(([id,item])=>({...item,id:item.id||id}));
      const variants=Array.isArray(raw.variants)?raw.variants:Object.entries(raw.variants||{}).map(([id,item])=>({...item,id:item.id||id}));
      return {...raw,timeline:typeof raw.timeline==='string'?raw.timeline:(raw.timeline?.name||'route'),goals,segments,variants,lineages:raw.lineages||[],drafts:raw.drafts||[]};
    }
    const selected = occurrence => selection.occurrence===occurrence;
    const predicateFor = id => graph.predicate_program?.definitions?.find(item=>item.name===id);
    const goalsFor = segment => graph.goals.filter(goal=>goal.segment===segment);
    const draftsUnder = (kind,id) => graph.drafts.filter(draft=>draft.parent?.kind===kind&&draft.parent?.id===id).sort((a,b)=>a.created_unix_ms-b.created_unix_ms);
    const draftsUnderVariant = (id,chain) => draftsUnder('variant',id).filter(draft=>{const lineage=graph.lineages.find(item=>item.name===draft.parent.lineage);const pinned=(lineage?.steps||[]).slice(0,draft.parent.step_index+1).map(step=>step.variant);return draft.parent.step_index===chain.length-1&&pinned.length===chain.length&&pinned.every((variant,index)=>variant===chain[index]);});
    const variantsFor = (segment,parentFingerprint=null) => graph.variants.filter(variant=>variant.segment===segment.id&&(parentFingerprint===null||variant.start_fingerprint===parentFingerprint)).sort((a,b)=>(Number(b.incumbent)-Number(a.incumbent))||a.id.localeCompare(b.id));
    function treeRow(kind,id,occurrence,name,icon,expandKey,hasChildren,tail='') {
      const open=expanded.has(expandKey);
      return `<div class="tree-row${selected(occurrence)?' selected':''}" role="treeitem" tabindex="0" data-select-kind="${escapeHtml(kind)}" data-select-id="${escapeHtml(id)}" data-select-occurrence="${escapeHtml(occurrence)}"><button class="disclosure${hasChildren?'':' empty'}${open?' open':''}" type="button" data-expand="${escapeHtml(expandKey)}" aria-label="${open?'Collapse':'Expand'}">▶</button><span class="tree-icon ${escapeHtml(kind)}">${icon}</span><span class="tree-name">${escapeHtml(name)}</span>${tail?`<span class="tree-tail">${tail}</span>`:''}</div>`;
    }
    function renderDraftNode(draft,path=new Set(),chain=[]) {
      if(path.has(draft.id))return '';
      const next=new Set(path);next.add(draft.id);
      const nextChain=[...chain,draft.id];
      const children=draftsUnder('draft',draft.id);
      const key=`draft:${nextChain.join('>')}`;
      occurrenceIndex.set(key,{kind:'draft',id:draft.id,chain:nextChain});
      const tail=`<span>${escapeHtml(draft.frame_count??0)}f</span><span class="dot ${draft.playable?'ok':draft.error?'bad':'warn'}"></span>`;
      const rendered=expanded.has(key)?children.map(child=>renderDraftNode(child,next,nextChain)).join(''):'';
      return `<div>${treeRow('draft',draft.id,key,draft.label||draft.id,'◇',key,children.length>0,tail)}${rendered?`<div class="tree-children">${rendered}</div>`:''}</div>`;
    }
    function renderVariantNode(variant,path=new Set(),chain=[]) {
      if(path.has(variant.id)) {
        const reference=`reference:${[...chain,variant.id].join('>')}`;
        occurrenceIndex.set(reference,{kind:'reference',id:variant.id,chain:[...chain,variant.id]});
        return treeRow('reference',variant.id,reference,`continues to ${variant.name||variant.id}`,'↩',reference,false);
      }
      const next=new Set(path);next.add(variant.id);
      const nextChain=[...chain,variant.id];
      const occurrence=`variant:${nextChain.join('>')}`;
      occurrenceIndex.set(occurrence,{kind:'variant',id:variant.id,chain:nextChain});
      const segment=graph.segments.find(item=>item.id===variant.segment);
      const drafts=draftsUnderVariant(variant.id,nextChain);
      const outgoing=graph.segments.filter(item=>item.parent===segment?.id&&variantsFor(item,variant.boundary_fingerprint).length>0).sort((a,b)=>a.id.localeCompare(b.id));
      const key=occurrence;
      const score=variant.first_hit_tick??variant.ticks;
      const state=variant.error?'bad':variant.playable?'ok':'warn';
      const tail=`${variant.incumbent?'<span>★</span>':''}${score!=null?`<span>${escapeHtml(score)}t</span>`:''}<span class="dot ${state}"></span>`;
      const hasChildren=drafts.length>0||outgoing.length>0;
      const children=expanded.has(key)?[...drafts.map(draft=>renderDraftNode(draft,new Set(),nextChain)),...outgoing.map(child=>renderSegmentNode(child,variant.boundary_fingerprint,next,nextChain))].join(''):'';
      return `<div>${treeRow('variant',variant.id,occurrence,variant.name||variant.id,'●',key,hasChildren,tail)}${children?`<div class="tree-children">${children}</div>`:''}</div>`;
    }
    function renderSegmentNode(segment,parentFingerprint=null,path=new Set(),chain=[],explicitVariants=null) {
      const variants=explicitVariants||variantsFor(segment,parentFingerprint);
      const key=`segment:${chain.join('>')}:${segment.id}`;
      occurrenceIndex.set(key,{kind:'segment',id:segment.id,chain:[...chain]});
      const children=expanded.has(key)?variants.map(variant=>renderVariantNode(variant,path,chain)).join(''):'';
      return `<div>${treeRow('segment',segment.id,key,label(segment.id),'─',key,variants.length>0,`<span>${variants.length}</span>`)}${children?`<div class="tree-children">${children}</div>`:''}</div>`;
    }
    function initializeExpansion() {
      if(expansionInitialized)return;
      expansionInitialized=true;
      expanded.add('origin:boot');
      const main=graph.lineages.find(lineage=>lineage.name==='main')||graph.lineages[0];
      const chain=[];
      (main?.steps||[]).forEach(step=>{expanded.add(`segment:${chain.join('>')}:${step.segment}`);chain.push(step.variant);expanded.add(`variant:${chain.join('>')}`);});
    }
    function collectCompatibleDescendants(variant,output=new Set()) {
      if(output.has(variant.id))return output;
      output.add(variant.id);
      const segment=graph.segments.find(item=>item.id===variant.segment);
      graph.segments.filter(item=>item.parent===segment?.id).forEach(next=>variantsFor(next,variant.boundary_fingerprint).forEach(child=>collectCompatibleDescendants(child,output)));
      return output;
    }
    function bootLineages() { return graph.lineages.filter(lineage=>{const first=lineage.steps?.[0];const variant=first&&graph.variants.find(item=>item.id===first.variant);return (variant?.play_anchors||[]).some(anchor=>anchor.lineage===lineage.name&&anchor.prefix_steps===0);}); }
    function unattachedRootVariants(unreachable,preferred=[]) {
      const remaining=new Set(unreachable.map(variant=>variant.id));const roots=[];
      preferred.forEach(root=>{if(!roots.some(item=>item.id===root.id))roots.push(root);});
      roots.forEach(root=>collectCompatibleDescendants(root).forEach(id=>remaining.delete(id)));
      while(remaining.size) {
        const candidates=graph.variants.filter(variant=>remaining.has(variant.id)&&!graph.variants.some(parent=>remaining.has(parent.id)&&graph.segments.find(item=>item.id===variant.segment)?.parent===parent.segment&&parent.boundary_fingerprint===variant.start_fingerprint));
        const chosen=candidates.length?candidates:[graph.variants.filter(variant=>remaining.has(variant.id)).sort((a,b)=>a.id.localeCompare(b.id))[0]];
        chosen.forEach(root=>{if(!remaining.has(root.id))return;roots.push(root);collectCompatibleDescendants(root).forEach(id=>remaining.delete(id));});
      }
      return roots;
    }
    function renderRootGroups(variants) {
      const bySegment=new Map();variants.forEach(variant=>{const list=bySegment.get(variant.segment)||[];list.push(variant);bySegment.set(variant.segment,list);});
      return [...bySegment.entries()].sort(([a],[b])=>a.localeCompare(b)).map(([segmentId,members])=>renderSegmentNode(graph.segments.find(item=>item.id===segmentId),null,new Set(),[],members.sort((a,b)=>(Number(b.incumbent)-Number(a.incumbent))||a.id.localeCompare(b.id)))).join('');
    }
    function renderTree() {
      initializeExpansion();
      occurrenceIndex=new Map();occurrenceIndex.set('origin:boot',{kind:'origin',id:'boot',chain:[]});
      const bootVariants=graph.variants.filter(variant=>graph.segments.find(segment=>segment.id===variant.segment)?.parent==null&&(variant.play_anchors||[]).some(anchor=>anchor.prefix_steps===0));
      const reachable=new Set();bootVariants.forEach(variant=>collectCompatibleDescendants(variant,reachable));
      const unattached=graph.variants.filter(variant=>!reachable.has(variant.id));
      const bootPinned=bootLineages();const bootPinnedNames=new Set(bootPinned.map(lineage=>lineage.name));
      const nonBootLineageRoots=graph.lineages.filter(lineage=>!bootPinnedNames.has(lineage.name)).map(lineage=>graph.variants.find(variant=>variant.id===lineage.steps?.[0]?.variant)).filter(Boolean);
      const bootDrafts=graph.drafts.filter(draft=>['origin','milestone'].includes(draft.parent?.kind)&&graph.origin?.id===draft.parent.id&&graph.origin.recordable_from_boot);
      const hasBootChildren=bootDrafts.length>0||bootVariants.length>0;
      const children=expanded.has('origin:boot')?[...bootDrafts.map(draft=>renderDraftNode(draft)),renderRootGroups(bootVariants)].join(''):'';
      let html=`${treeRow('origin','boot','origin:boot','Boot','◆','origin:boot',hasBootChildren,`<span>${bootPinned.length} pinned</span>`)}${children?`<div class="tree-children">${children}</div>`:''}`;
      const otherRoots=unattachedRootVariants(unattached,nonBootLineageRoots);
      if(otherRoots.length){const key='origin:unattached';occurrenceIndex.set(key,{kind:'origin',id:'unattached',chain:[]});const other=expanded.has(key)?renderRootGroups(otherRoots):'';html+=`${treeRow('origin','unattached',key,'Other roots','◇',key,true,`<span>${otherRoots.length} roots</span>`)}${other?`<div class="tree-children">${other}</div>`:''}`;}
      $('tree').innerHTML=html||'<div class="empty">No route variants.</div>';
      $('tree').querySelectorAll('[data-select-kind]').forEach(row=>{const activate=()=>{const context=occurrenceIndex.get(row.dataset.selectOccurrence);selection={kind:row.dataset.selectKind,id:row.dataset.selectId,occurrence:row.dataset.selectOccurrence,chain:[...(context?.chain||[])]};render();};row.addEventListener('click',activate);row.addEventListener('keydown',event=>{if(event.target===row&&(event.key==='Enter'||event.key===' ')){event.preventDefault();activate();}});});
      $('tree').querySelectorAll('[data-expand]').forEach(button=>button.addEventListener('click',event=>{event.stopPropagation();const key=button.dataset.expand;expanded.has(key)?expanded.delete(key):expanded.add(key);renderTree();}));
    }
    function field(name,value,mono=false) { return `<div class="field-label">${escapeHtml(name)}</div><div class="field-value${mono?' mono':''}">${escapeHtml(value??'—')}</div>`; }
    function goalDetail(segmentId,proofs=[]) {
      const goals=goalsFor(segmentId);
      if(!goals.length)return `<div class="detail-section"><h3>Goals</h3><div class="empty">No parity goal is attached to this segment.</div></div>`;
      return goals.map(goal=>{const predicate=predicateFor(goal.predicate);const proof=proofs.find(item=>item.goal===goal.id);return `<div class="detail-section"><h3>Goal · ${escapeHtml(label(goal.id))}</h3><div class="fields">${field('Predicate',goal.predicate)}${proof?field('Proof',proof.status):''}${proof?.first_hit_tick!=null?field('First hit',`${proof.first_hit_tick} ticks`):''}${predicate?field('Evaluation',`${label(predicate.phase)} · stable ${predicate.stable_ticks}`):''}${predicate?field('Definition',predicate.definition_sha256,true):''}</div>${predicate?`<details class="advanced"><summary>Predicate structure</summary><div class="predicate">${escapeHtml(JSON.stringify(predicate.expression,null,2))}</div></details>`:''}<div class="actions"><button class="edit-predicate" type="button" data-edit-predicate="${escapeHtml(goal.predicate)}">Edit predicate…</button></div></div>`;}).join('');
    }
    function anchorPrefix(anchor,includeSelected=false) { const lineage=graph.lineages.find(item=>item.name===anchor.lineage);const count=includeSelected?anchor.step_index+1:anchor.prefix_steps;return (lineage?.steps||[]).slice(0,count).map(step=>step.variant); }
    function sameChain(left,right) { return left.length===right.length&&left.every((value,index)=>value===right[index]); }
    function variantActions(variant,chain) {
      const scopedPlays=(variant.play_anchors||[]).filter(anchor=>sameChain([...anchorPrefix(anchor),variant.id],chain));
      const scopedRecords=(variant.record_anchors||[]).filter(anchor=>sameChain(anchorPrefix(anchor,true),chain));
      const plays=scopedPlays.map(anchor=>{const repeated=scopedPlays.filter(candidate=>candidate.lineage===anchor.lineage).length>1;const playLabel=repeated?`${anchor.lineage} @ step ${anchor.prefix_steps}`:anchor.lineage;return `<button class="play" type="button" data-play-kind="variant" data-play-origin="boot" data-id="${escapeHtml(variant.id)}" data-lineage="${escapeHtml(anchor.lineage)}" data-prefix-steps="${anchor.prefix_steps}" data-parent-segment="${escapeHtml(anchor.parent_segment||'')}" data-start-fingerprint="${escapeHtml(anchor.start_fingerprint)}" data-play-label="${escapeHtml(playLabel)}">Play · ${escapeHtml(playLabel)}</button>`;}).join('');
      const records=scopedRecords.map(anchor=>{const repeated=scopedRecords.filter(candidate=>candidate.lineage===anchor.lineage).length>1;const recordLabel=repeated?`${anchor.lineage} @ step ${anchor.step_index}`:anchor.lineage;return `<button class="record" type="button" data-record-kind="variant" data-id="${escapeHtml(variant.id)}" data-lineage="${escapeHtml(anchor.lineage)}" data-step-index="${anchor.step_index}" data-terminal-goal="${escapeHtml(anchor.goal)}">Record child · ${escapeHtml(recordLabel)} → ${escapeHtml(label(anchor.goal))}</button>`;}).join('');
      return `<div class="actions">${plays||'<button class="play" type="button" disabled>Playback unavailable</button>'}${records}</div>`;
    }
    function renderDetail() {
      let html='';const context=occurrenceIndex.get(selection.occurrence)||selection;
      if(selection.kind==='origin'&&selection.id==='boot') {
        const boot=graph.origin?.recordable_from_boot?graph.origin:null;const pinned=bootLineages();
        html=`<div class="detail-kicker">Origin</div><div class="detail-title">Boot</div><div class="detail-subtitle">A fresh process before the first emulated controller input. Root segments continue from here.</div><div class="detail-section"><h3>Pinned routes</h3><div class="fields">${pinned.map(lineage=>field(lineage.name,`${lineage.steps.length} segment${lineage.steps.length===1?'':'s'} · ${lineage.playable?'playable':'blocked'}`)).join('')||field('Routes','None')}</div></div>${boot?`<div class="actions"><button class="record" type="button" data-record-kind="origin" data-id="${escapeHtml(boot.id)}">Record from Boot</button></div>`:''}`;
      } else if(selection.kind==='origin') {
        const bootNames=new Set(bootLineages().map(lineage=>lineage.name));const pinned=graph.lineages.filter(lineage=>!bootNames.has(lineage.name));
        html=`<div class="detail-kicker">Unattached origins</div><div class="detail-title">Other roots</div><div class="detail-subtitle">Seeded, disconnected, or cyclic route components without a verified console-Boot ancestry. They are kept visible but are never mislabeled as Boot-playable.</div><div class="detail-section"><h3>Pinned routes</h3><div class="fields">${pinned.map(lineage=>field(lineage.name,`${lineage.steps.length} segment${lineage.steps.length===1?'':'s'} · ${lineage.playable?'playable':'blocked'}`)).join('')||field('Routes','None')}</div></div>`;
      } else if(selection.kind==='segment') {
        const segment=graph.segments.find(item=>item.id===selection.id);
        if(segment)html=`<div class="detail-kicker">Segment</div><div class="detail-title">${escapeHtml(label(segment.id))}</div><div class="detail-subtitle">A structural continuation beneath ${escapeHtml(segment.parent?label(segment.parent):'Boot')}. Goals are optional parity metadata.</div><div class="detail-section"><h3>Route</h3><div class="fields">${field('Parent segment',segment.parent||'Boot')}${field('Profile',segment.profile)}${field('Checked variants',graph.variants.filter(item=>item.segment===segment.id).length)}</div></div>${goalDetail(segment.id)}`;
      } else if(selection.kind==='variant') {
        const variant=graph.variants.find(item=>item.id===selection.id);const segment=variant&&graph.segments.find(item=>item.id===variant.segment);const artifact=variant?.artifact||{};const score=variant&&(variant.first_hit_tick??variant.ticks);
        if(variant&&segment)html=`<div class="detail-kicker">Segment variant</div><div class="detail-title">${escapeHtml(variant.name||variant.id)}</div><div class="detail-subtitle">${escapeHtml(label(segment.id))}</div><div class="badges">${variant.incumbent?'<span class="badge incumbent">incumbent</span>':''}${score!=null?`<span class="badge score">${escapeHtml(score)} tick score</span>`:''}${(variant.goal_proofs||[]).map(proof=>`<span class="badge proof-${escapeHtml(proof.status)}">${escapeHtml(label(proof.goal))} · ${escapeHtml(label(proof.status))}</span>`).join('')}</div>${variantActions(variant,context.chain)}<div class="detail-section"><h3>Boundary</h3><div class="fields">${field('Input',variant.start_fingerprint,true)}${field('Output',variant.boundary_fingerprint,true)}${field('Frames',variant.frame_count)}${field('Artifact',`${artifact.kind||'artifact'} · ${artifact.value||'—'}`)}</div></div>${goalDetail(segment.id,variant.goal_proofs||[])}${variant.error?`<div class="detail-section error-note">${escapeHtml(variant.error)}</div>`:''}`;
      } else if(selection.kind==='draft') {
        const draft=graph.drafts.find(item=>item.id===selection.id);
        if(draft){const parent=draft.parent||{};const parentPlayback=parent.kind==='milestone'?'':`<button class="play" type="button" data-play-kind="draft" data-play-origin="parent" data-id="${escapeHtml(draft.id)}" ${draft.playable?'':'disabled'}>Play from parent</button>`;html=`<div class="detail-kicker">Draft continuation</div><div class="detail-title">${escapeHtml(draft.label||draft.id)}</div><div class="detail-subtitle">Unpromoted recorded input. Its immutable ID and tape remain separate from its display name.</div><div class="badges"><span class="badge ${draft.playable?'ok':'bad'}">${escapeHtml(label(draft.status))}</span><span class="badge">${escapeHtml(draft.verification)}</span></div><div class="actions"><button class="play" type="button" data-play-kind="draft" data-play-origin="boot" data-id="${escapeHtml(draft.id)}" ${draft.playable?'':'disabled'}>Play from boot</button>${parentPlayback}<button class="record" type="button" data-record-kind="draft" data-id="${escapeHtml(draft.id)}" ${draft.playable?'':'disabled'}>Record child</button><button class="rename" type="button" data-rename-draft="${escapeHtml(draft.id)}">Rename…</button><button class="delete" type="button" data-delete-draft="${escapeHtml(draft.id)}">Delete…</button></div><div class="detail-section"><h3>Draft</h3><div class="fields">${field('Frames',draft.frame_count)}${field('Parent',`${parent.kind||'unknown'} · ${parent.id||'—'}`)}${field('Endpoint',draft.endpoint_kind)}${field('Tape SHA-256',draft.tape_sha256,true)}${field('ID',draft.id,true)}</div></div>${draft.error?`<div class="detail-section error-note">${escapeHtml(draft.error)}</div>`:''}`;}
      } else if(selection.kind==='reference') { const variant=graph.variants.find(item=>item.id===selection.id);html=`<div class="detail-kicker">Continuation reference</div><div class="detail-title">${escapeHtml(variant?.name||selection.id)}</div><div class="detail-subtitle">This path returns to a variant already shown above. Expansion stops here to keep cyclic routes finite.</div>`; }
      $('detail').innerHTML=html||'<div class="empty">This entry no longer exists.</div>';
      bindActions($('detail'));
    }
    function bindActions(root) {
      root.querySelectorAll('[data-play-kind]').forEach(button=>button.addEventListener('click',()=>play(button)));
      root.querySelectorAll('[data-record-kind]').forEach(button=>button.addEventListener('click',()=>record(button)));
      root.querySelectorAll('[data-rename-draft]').forEach(button=>button.addEventListener('click',()=>renameDraft(button.dataset.renameDraft,button)));
      root.querySelectorAll('[data-delete-draft]').forEach(button=>button.addEventListener('click',()=>deleteDraft(button.dataset.deleteDraft,button)));
      root.querySelectorAll('[data-edit-predicate]').forEach(button=>button.addEventListener('click',()=>editPredicate(button.dataset.editPredicate)));
    }
    function render() { $('timelineName').textContent=`${graph.timeline} · Git timeline`;renderTree();if(!occurrenceIndex.has(selection.occurrence)){selection={kind:'origin',id:'boot',occurrence:'origin:boot',chain:[]};renderTree();}renderDetail(); }
    function editPredicate(id) {
      if(!graph.predicate_program)return;
      $('predicateTitle').textContent=`Edit objective · ${label(id)}`;
      $('predicateSource').value=graph.predicate_program.source;
      predicateEditRevision=graph.predicate_program.revision_sha256;
      $('predicateError').textContent='';
      $('predicateEditor').showModal();
      $('predicateSource').focus();
    }
    async function savePredicate() {
      if(!graph.predicate_program)return;
      const button=$('savePredicate'); button.disabled=true; button.textContent='Compiling…';
      $('predicateError').textContent='';
      try {
        const response=await fetch('/api/milestone-program',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({expected_revision_sha256:predicateEditRevision,source:$('predicateSource').value})});
        const body=await response.json().catch(()=>({}));
        if(!response.ok)throw new Error(body.error||`HTTP ${response.status}`);
        graph.predicate_program=body;
        predicateEditRevision=null;
        $('predicateEditor').close();
        toast('Goal predicates compiled and saved. Variant proof badges now reflect the new definition identities.');
        await load();
      } catch(error) {
        $('predicateError').textContent=error.message;
      } finally {
        button.disabled=false; button.textContent='Validate & save';
      }
    }
    async function play(button) {
      const {playKind:kind,id}=button.dataset;
      const origin=button.dataset.playOrigin||'boot';
      const variant=kind==='variant'&&graph.variants.find(item=>item.id===id);
      const draft=kind==='draft'&&graph.drafts.find(item=>item.id===id);
      const segment=variant&&graph.segments.find(item=>item.id===variant.segment);
      if(!variant&&!draft)return;
      const name=variant?.name||draft?.label||id;
      button.disabled=true; button.textContent='Launching…';
      $('status').textContent=`Launching ${name}...`; $('status').className='status';
      const payload=variant?{selection:{kind:'variant',id,lineage:button.dataset.lineage,prefix_steps:Number(button.dataset.prefixSteps),parent_segment:button.dataset.parentSegment||null,start_fingerprint:button.dataset.startFingerprint},stop:{kind:'segment',segment:segment.id},handoff:true,origin:'boot'}:{selection:{kind:'draft',id},stop:{kind:'tick',tick:0},handoff:true,origin};
      try {
        const response=await fetch('/api/play',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});
        const body=await response.json().catch(()=>({}));
        if(!response.ok)throw new Error(body.error||`HTTP ${response.status}`);
        $('status').textContent=`Running ${name}`; $('status').className='status ok';
        const detail=body.fast_forward_frames?` Fast-forwarding ${body.fast_forward_frames} parent frames.`:'';
        toast(`Launched ${name} from ${body.origin||origin}.${detail} Controller handoff is armed after ${body.frames||'the selected'} frames.`);
      } catch(error) {
        $('status').textContent='Launch failed'; $('status').className='status error'; toast(error.message,true);
      } finally {
        button.disabled=!(variant?.playable||draft?.playable); button.textContent=variant?`Play · ${button.dataset.playLabel||button.dataset.lineage}`:origin==='parent'?'Play from parent':'Play from boot';
      }
    }
    async function deleteDraft(id,button) {
      button.disabled=true; button.textContent='Checking…';
      try {
        const previewResponse=await fetch('/api/drafts/delete/preview',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id})});
        const preview=await previewResponse.json().catch(()=>({}));
        if(!previewResponse.ok)throw new Error(preview.error||`HTTP ${previewResponse.status}`);
        const impacts=(preview.drafts||[]).map(item=>`• ${item.label||item.id} (${item.id})`).join('\n');
        const count=(preview.drafts||[]).length;
        if(!window.confirm(`Move ${count} draft${count===1?'':'s'} to recoverable trash?\n\n${impacts}\n\nChecked-in variants and timeline files are not affected.`))return;
        button.textContent='Moving…';
        const applyResponse=await fetch('/api/drafts/delete/apply',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id,confirmation_token:preview.confirmation_token})});
        const result=await applyResponse.json().catch(()=>({}));
        if(!applyResponse.ok)throw new Error(result.error||`HTTP ${applyResponse.status}`);
        toast(`Moved ${(result.drafts||[]).length} draft${(result.drafts||[]).length===1?'':'s'} to recoverable trash.`);
        await load();
      } catch(error) {
        $('status').textContent='Delete failed'; $('status').className='status error'; toast(error.message,true);
      } finally {
        button.disabled=false; button.textContent='Delete…';
      }
    }
    async function renameDraft(id,button) {
      const draft=graph.drafts.find(item=>item.id===id); if(!draft)return;
      const expectedRevision=graph.draft_graph_revision;
      const entered=window.prompt('Rename draft',draft.label||''); if(entered===null)return;
      if(entered.trim()===draft.label)return;
      button.disabled=true; button.textContent='Renaming…';
      try {
        const response=await fetch('/api/drafts/rename',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id,label:entered,expected_graph_revision:expectedRevision})});
        const body=await response.json().catch(()=>({}));
        if(!response.ok)throw new Error(body.error||`HTTP ${response.status}`);
        toast(`Renamed draft to ${body.label}. Its immutable ID and tape were not changed.`);
        await load();
      } catch(error) {
        $('status').textContent='Rename failed'; $('status').className='status error'; toast(error.message,true);
      } finally {
        button.disabled=false; button.textContent='Rename…';
      }
    }
    async function record(button) {
      const kind=button.dataset.recordKind, id=button.dataset.id;
      const entered=window.prompt('Optional draft label',''); if(entered===null)return;
      const parent=kind==='variant'?{kind,id,lineage:button.dataset.lineage,step_index:Number(button.dataset.stepIndex),terminal_goal:button.dataset.terminalGoal}:{kind,id};
      button.disabled=true; button.textContent='Launching...';
      try {
        const response=await fetch('/api/record',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({parent,label:entered})});
        const body=await response.json().catch(()=>({})); if(!response.ok)throw new Error(body.error||`HTTP ${response.status}`);
        $('status').textContent='Recording live input'; $('status').className='status ok';
        const prefix=body.frames_before_recording?` Replaying ${body.frames_before_recording} parent frames hidden, muted, and unpaced first.`:'';
        toast(`Recording ${body.draft_id}.${prefix} Close Dusklight normally to finalize.`); setTimeout(load,750);
      } catch(error) { $('status').textContent='Record failed'; $('status').className='status error'; toast(error.message,true); }
      finally { button.disabled=false; button.textContent=kind==='variant'?`Record child · ${button.dataset.lineage}`:kind==='origin'?'Record from Boot':'Record child'; }
    }
    async function load() {
      $('status').textContent='Loading…'; $('status').className='status'; $('tree').innerHTML='<div class="empty">Loading route…</div>'; $('detail').innerHTML='<div class="empty">Loading selection…</div>';
      try {
        const response=await fetch('/api/graph',{cache:'no-store'});
        const body=await response.json().catch(()=>({}));
        if(!response.ok)throw new Error(body.error||`HTTP ${response.status}`);
        graph=normalize(body); render(); $('status').textContent='Ready'; $('status').className='status ok';
        clearTimeout(load.poll); if(graph.drafts.some(draft=>['preparing','recording','orphaned'].includes(draft.status)))load.poll=setTimeout(load,2500);
      } catch(error) {
        $('timelineName').textContent='Could not load timeline'; $('status').textContent='Disconnected'; $('status').className='status error';
        $('tree').innerHTML=`<div class="empty">${escapeHtml(error.message)}<br><br>Start this page through the Route Workbench launch configuration.</div>`;
        $('detail').innerHTML='<div class="empty">No route loaded.</div>';
      }
    }
    $('reload').addEventListener('click',load);
    $('savePredicate').addEventListener('click',savePredicate);
    $('predicateEditor').addEventListener('close',()=>predicateEditRevision=null);
    load();
  })();
  </script>
</body>
</html>
